<html lang="en">

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOVA Store — Checkout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WRG99C2N"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<nav>
  <a href="index.html" class="logo">NO<span>V</span>A</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
  </ul>
  <a href="cart.html" class="nav-cart" id="cart-badge">🛒 Cart</a>
</nav>

<div class="page-header">
  <h1>🔒 Checkout</h1>
  <p>Secure, encrypted payment</p>
</div>

<div class="page">
  <div class="breadcrumb"><a href="index.html">Home</a> › <a href="cart.html">Cart</a> › Checkout</div>

  <div id="checkout-content"></div>
</div>

<footer>© 2026 <span>NOVA</span> Store. All rights reserved.</footer>
<div id="toast"></div>
<script src="app.js"></script>
<script>
function renderCheckout() {
  const cart = getCart();
  if (!cart.length) {
    document.getElementById('checkout-content').innerHTML = `
      <div class="empty-cart">
        <div class="icon">🛒</div>
        <p>Your cart is empty!</p>
        <a href="shop.html" class="btn btn-gold">Go to Shop</a>
      </div>`;
    return;
  }

  const sub = cartSubtotal();
  const shipping = sub >= 999 ? 0 : 99;
  const total = sub + shipping;

  document.getElementById('checkout-content').innerHTML = `
  <div class="checkout-grid">

    <!-- LEFT: FORM -->
    <div>
      <!-- SHIPPING -->
      <div class="form-card" style="margin-bottom:20px">
        <h3>📦 Shipping Address</h3>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" id="fname" placeholder="Arjun"></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="lname" placeholder="Sharma"></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="arjun@email.com"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+91 98765 43210"></div>
        <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="House No., Street Name, Area"></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" id="city" placeholder="Hyderabad"></div>
          <div class="form-group"><label>Pincode</label><input type="text" id="pin" placeholder="500001"></div>
        </div>
        <div class="form-group">
          <label>State</label>
          <select id="state">
            <option>Telangana</option><option>Maharashtra</option><option>Karnataka</option>
            <option>Tamil Nadu</option><option>Delhi</option><option>Gujarat</option><option>Rajasthan</option>
          </select>
        </div>
      </div>

      <!-- PAYMENT -->
      <div class="form-card">
        <h3>💳 Payment Method</h3>
        <div class="payment-opts">
          <div class="pay-opt selected" onclick="selectPay(this)">💳 Credit / Debit Card</div>
          <div class="pay-opt" onclick="selectPay(this)">📱 UPI / GPay / PhonePe</div>
          <div class="pay-opt" onclick="selectPay(this)">🏦 Net Banking</div>
          <div class="pay-opt" onclick="selectPay(this)">📦 Cash on Delivery</div>
        </div>
        <div id="card-fields">
          <div class="form-group"><label>Card Number</label><input type="text" placeholder="•••• •••• •••• ••••" maxlength="19"></div>
          <div class="form-row">
            <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM / YY"></div>
            <div class="form-group"><label>CVV</label><input type="text" placeholder="•••" maxlength="3"></div>
          </div>
          <div class="form-group"><label>Name on Card</label><input type="text" placeholder="Arjun Sharma"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="order-card">
      <h3>🧾 Order Summary</h3>
      ${cart.map(i=>`
        <div class="order-item">
          <span class="order-item-emoji">${i.emoji}</span>
          <div class="order-item-name">${i.name}<br><span style="color:#999;font-size:12px">Qty: ${i.qty}</span></div>
          <span class="order-item-price">${fmt(i.price*i.qty)}</span>
        </div>`).join('')}

      <div style="margin-top:16px;border-top:1px solid #eee;padding-top:14px">
        <div class="summary-row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
        <div class="summary-row"><span>Shipping</span><span class="${shipping===0?'free':''}">${shipping===0?'FREE':fmt(shipping)}</span></div>
        <div class="summary-row total"><span>Total</span><span style="color:#c9a84c">${fmt(total)}</span></div>
      </div>

      <button onclick="placeOrder()" class="btn btn-gold btn-full" style="margin-top:20px;padding:15px;font-size:15px">
        ✅ Place Order — ${fmt(total)}
      </button>
      <a href="cart.html" class="btn btn-outline btn-full" style="margin-top:10px">← Back to Cart</a>

      <div style="margin-top:16px;font-size:12px;color:#888;text-align:center;line-height:2">
        🔒 256-bit SSL encryption<br>
        🚚 Estimated delivery: 3–5 business days
      </div>
    </div>
  </div>`;
}

function selectPay(el) {
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('card-fields').style.display = el.textContent.includes('Card') ? 'block' : 'none';
}

function placeOrder() {
  const fname = document.getElementById('fname');
  if (!fname || !fname.value.trim()) { showToast('Please fill in your name!'); return; }
  const orderId = 'NOVA' + Math.floor(10000 + Math.random()*90000);
  localStorage.setItem('nova_last_order', orderId);
  saveCart([]);
  updateCartBadge();
  window.location.href = 'confirmation.html';
}

renderCheckout();
</script>
</body>
</html>
